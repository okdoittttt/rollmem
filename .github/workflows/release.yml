name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Manual approval is enforced by protection rules on this environment,
    # configured in the repository settings (Settings -> Environments -> pypi).
    environment:
      name: pypi
      url: https://pypi.org/project/rollmem/
    permissions:
      # Required for Trusted Publishing (OIDC): no API token is stored.
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
